kind = "web"
previewPath = "/"
title = "Event Orchestrator"
version = "1.0.0"
id = "artifacts/event-orchestrator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18708

[services.development]
run = "pnpm --filter @workspace/event-orchestrator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/event-orchestrator", "run", "build" ]
publicDir = "artifacts/event-orchestrator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18708"
BASE_PATH = "/"
